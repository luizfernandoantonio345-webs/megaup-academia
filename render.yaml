services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: fitsaas-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false        # preencher com a URL do Neon (neon.tech)
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false        # preencher manualmente no dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: ASAAS_API_KEY
        sync: false        # preencher se quiser Asaas ativo
      - key: ASAAS_SANDBOX
        value: "true"
      - key: FRONTEND_BASE_URL
        sync: false        # preencher com a URL do frontend após deploy

  # ─── Frontend (React/Vite → Static Site) ─────────────────────────────────
  - type: web
    name: fitsaas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false        # preencher com a URL do backend após criar o serviço
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Banco de dados externo (Neon.tech) — configure DATABASE_URL manualmente no backend
