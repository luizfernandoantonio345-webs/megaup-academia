services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: megaup-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false        # preencher com a URL do Neon (neon.tech)
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false        # preencher manualmente no dashboard
      - key: RESEND_API_KEY
        sync: false        # resend.com → free plan → 3 000 emails/mês
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: ASAAS_API_KEY
        sync: false        # preencher se quiser Asaas ativo
      - key: ASAAS_SANDBOX
        value: "true"
      - key: FRONTEND_BASE_URL
        sync: false        # preencher com a URL do frontend após deploy
      - key: APP_URL
        sync: false        # URL do backend (ex: https://megaup-api.onrender.com)
      - key: EMAIL_FROM
        value: "noreply@megaup.app"
      - key: VAPID_PUBLIC_KEY
        sync: false        # gerar com: npx web-push generate-vapid-keys
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

  # ─── Frontend (React/Vite → Static Site) ─────────────────────────────────
  - type: web
    name: megaup-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && NODE_OPTIONS="--max-old-space-size=1536" npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://megaup-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Banco de dados externo (Neon.tech) — configure DATABASE_URL manualmente no backend
