services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: megaup-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false        # preencher com a URL do Neon (neon.tech)
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false        # preencher manualmente no dashboard
      - key: RESEND_API_KEY
        sync: false        # resend.com → free plan → 3 000 emails/mês
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: ASAAS_API_KEY
        sync: false        # preencher se quiser Asaas ativo
      - key: ASAAS_SANDBOX
        value: "true"
      - key: FRONTEND_BASE_URL
        value: https://megaup-academia.onrender.com
      - key: APP_URL
        value: https://megaup-api.onrender.com
      - key: EMAIL_FROM
        value: "noreply@megaup.app"
      - key: VAPID_PUBLIC_KEY
        sync: false        # gerar com: npx web-push generate-vapid-keys
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

  # ─── Frontend (Next.js 15 → Node.js) ────────────────────────────────────────
  - type: web
    name: megaup-academia
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: NEXT_PUBLIC_API_URL
        value: https://megaup-api.onrender.com
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1536"
      - key: PORT
        value: "3000"

# Banco de dados externo (Neon.tech) — configure DATABASE_URL manualmente no backend
