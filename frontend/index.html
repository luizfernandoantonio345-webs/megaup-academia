<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />

    <!-- Preconnect ao backend para eliminar handshake DNS+TCP+TLS no primeiro request -->
    <link rel="preconnect" href="https://megaup-backend.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://megaup-backend.onrender.com" />

    <!-- Viewport com suporte a notch/safe area -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA básico -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ef4444" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MegaUp" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="apple-touch-startup-image" href="/icon-512.svg" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Ícone e título -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>MegaUp · Academia Jardim das Rosas</title>

    <!-- Prevent text size adjust on rotation -->
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO -->
    <meta name="description" content="MegaUp Jardim das Rosas — academia completa com musculação, funcional, dança livre e Ritbox. App exclusivo para acompanhar sua evolução." />
    <meta name="keywords" content="academia, musculação, funcional, ritbox, dança, jardim das rosas, megaup, treino" />
    <link rel="canonical" href="https://megaup.onrender.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://megaup.onrender.com/" />
    <meta property="og:title" content="MegaUp · Academia Jardim das Rosas" />
    <meta property="og:description" content="Academia MegaUp Jardim das Rosas — musculação, funcional, dança livre e Ritbox com app exclusivo de acompanhamento." />
    <meta property="og:image" content="https://megaup.onrender.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="MegaUp Jardim das Rosas" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://megaup.onrender.com/" />
    <meta name="twitter:title" content="MegaUp · Academia Jardim das Rosas" />
    <meta name="twitter:description" content="Academia MegaUp Jardim das Rosas — musculação, funcional, dança livre e Ritbox com app exclusivo de acompanhamento." />
    <meta name="twitter:image" content="https://megaup.onrender.com/og-image.png" />
  </head>
  <body>
    <!-- Anti-FOUC: apply theme before React renders to prevent flash -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('MegaUp-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <!-- Pre-warm: fires before React even initializes, giving backend a head start -->
    <script>
      (function() {
        try {
          var url = '%VITE_API_URL%';
          if (url && url.indexOf('%') === -1) {
            fetch(url + '/ping', { method: 'GET', cache: 'no-store' }).catch(function(){});
          }
        } catch(e) {}
      })();
    </script>
    <div id="root" translate="no"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
